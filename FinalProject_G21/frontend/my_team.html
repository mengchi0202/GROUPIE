<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的組隊 - GROUPIE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
    }

    body {
      background-color: #f4f7f6;
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    }

    /* 英雄背景區域 */
    .hero-banner {
      background: var(--primary-gradient);
      padding: 50px 0 80px 0;
      color: white;
      border-radius: 0 0 40px 40px;
      margin-bottom: -40px;
    }

    /* 入口卡片樣式 */
    .portal-card {
      border: none;
      border-radius: 25px;
      background: white;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      cursor: pointer;
      overflow: hidden;
      text-decoration: none !important;
      display: block;
    }

    .portal-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(13, 110, 253, 0.15);
    }

    .card-icon {
      font-size: 3.5rem;
      margin-bottom: 15px;
      display: block;
    }

    .portal-title {
      font-weight: 800;
      color: #212529;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .portal-desc {
      color: #6c757d;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    /* 統一藍色按鈕 */
    .btn-custom {
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 30px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-custom:hover {
      box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
      color: white;
      transform: scale(1.05);
    }

    .back-btn {
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }
    .back-btn:hover { color: white; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="hero-banner">
    <div class="container text-center">
      <div class="d-flex justify-content-start">
        <button class="btn btn-link back-btn text-decoration-none p-0 mb-3" onclick="history.back()">&larr; 返回首頁</button>
      </div>
      <h1 class="fw-bold">我的組隊專區</h1>
      <p class="opacity-75">追蹤進行中的專案，或回顧過去的輝煌戰績</p>
    </div>
  </div>

  <div class="container" style="position: relative; z-index: 10;">
    <div class="row g-4 justify-content-center">
      
      <div class="col-md-5">
        <a href="ongoing_teams.html" class="portal-card p-5 text-center">
          <span class="card-icon">⏳</span>
          <h3 class="portal-title">進行中組隊</h3>
          <p class="portal-desc">管理當前專案，查看組員進度與詳情</p>
          <span class="btn btn-custom px-5">點擊進入</span>
        </a>
      </div>

      <div class="col-md-5">
        <a href="team_history.html" class="portal-card p-5 text-center">
          <span class="card-icon">📚</span>
          <h3 class="portal-title">歷史紀錄</h3>
          <p class="portal-desc">回顧已完成的專案與過往的評價紀錄</p>
          <span class="btn btn-custom px-5">查看歷史</span>
        </a>
      </div>

    </div>

    <div id="teamCards" class="row mt-5">
      </div>

    <footer class="mt-5 py-4 text-center">
      <p class="text-secondary small">© 2025 GROUPIE Matching System. 同心協力，事半功倍。</p>
    </footer>
  </div>

  <script>
    // 載入導覽列
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        const placeholder = document.getElementById('navbar-placeholder');
        if (placeholder) placeholder.innerHTML = html;
      });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
