<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>聊天室（申請者）</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"> <!-- ✅ 加入統一 CSS -->
</head>
<body>
  <div class="container mt-5">
    <h2>聊天室 - 成員</h2>

    <div class="border p-3 mb-3 rounded" style="height: 300px; overflow-y: auto; background-color: #fff;">
      <p><strong>你：</strong>請問這組會做APP嗎？</p>
      <p><strong>組長：</strong>會，我們預計用 React Native</p>
    </div>

    <textarea class="form-control mb-2" rows="2" placeholder="輸入訊息..."></textarea>

    <div class="d-flex gap-2">
      <button class="btn btn-primary">送出</button>
<button type="button" class="btn btn-link text-decoration-none me-2" onclick="history.back()">&larr; 返回</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
