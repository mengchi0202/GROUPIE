<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人資料設定 - GROUPIE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --primary-blue: #0d6efd;
      --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
      --bg-light-blue: #f0f7ff;
    }

    body { 
      background-color: var(--bg-light-blue); 
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
      min-height: 100vh;
    }

    /* 頂部 Header */
    .header-section {
      background: var(--primary-gradient);
      padding: 40px 0 60px 0;
      color: white;
      border-radius: 0 0 30px 30px;
    }

    .back-link { color: rgba(255,255,255,0.8); transition: 0.2s; }
    .back-link:hover { color: white; }

    /* 表單容器 */
    .form-container {
      margin-top: -30px;
      z-index: 10;
      position: relative;
      max-width: 800px;
    }

    .custom-card {
      border: none;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.08);
      padding: 40px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary-blue);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }

    .section-title::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--primary-gradient);
      margin-right: 10px;
      border-radius: 10px;
    }

    /* 輸入框與標籤 */
    .form-label { font-weight: 600; color: #475569; }
    .form-control {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 15px;
    }

    /* 權重按鈕組 */
    .btn-group .btn-outline-dark {
      border-color: #e2e8f0;
      color: #64748b;
    }
    .btn-check:checked + .btn-outline-dark {
      background-color: var(--primary-blue);
      border-color: var(--primary-blue);
      color: white;
    }

    /* 黑名單樣式 */
    #blacklistDisplay {
      border: 1px solid #f1f5f9;
      border-radius: 12px;
      overflow: hidden;
    }
    .list-group-item {
      border-color: #f1f5f9;
      padding: 12px 20px;
    }

    /* 主要按鈕 */
    .btn-save {
      background: var(--primary-gradient);
      border: none;
      border-radius: 12px;
      font-weight: 700;
      padding: 14px;
      transition: 0.3s;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.2);
    }

    .btn-time-config {
      border-radius: 10px;
      font-weight: 600;
      border: 1px dashed var(--primary-blue);
      color: var(--primary-blue);
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="header-section text-center">
    <div class="container">
      <div class="d-flex justify-content-start">
        <button class="btn btn-link back-link text-decoration-none p-0 mb-3" onclick="history.back()">&larr; 返回上頁</button>
      </div>
      <h2 class="fw-bold">個人資料設定</h2>
      <p class="opacity-75">管理您的個人資訊、專長及組隊偏好權重</p>
    </div>
  </div>

  <div class="container form-container mb-5">
    <form id="profileForm" class="custom-card">
      
      <div class="section-title">基本資料</div>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">姓名</label>
          <input type="text" class="form-control" id="name" placeholder="您的姓名" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">系級</label>
          <input type="text" class="form-control" id="dept" placeholder="例如：資管系三A" required>
        </div>
        <div class="col-12">
          <label class="form-label">我的專長（可複選）</label>
          <div class="d-flex flex-wrap gap-3 mt-1">
            <div class="form-check"><input class="form-check-input" type="checkbox" name="skill" value="報告" id="skill1"><label class="form-check-label" for="skill1">簡報製作</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" name="skill" value="領導" id="skill2"><label class="form-check-label" for="skill2">團隊領導</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" name="skill" value="程式設計" id="skill4"><label class="form-check-label" for="skill4">程式設計</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" name="skill" value="資料分析" id="skill5"><label class="form-check-label" for="skill5">資料分析</label></div>
          </div>
        </div>
        <div class="col-12 mt-3">
          <label class="form-label">個人經歷 / 自我介紹</label>
          <textarea class="form-control" id="experience" rows="3" placeholder="簡短描述您的過往課程經歷或擅長工具..."></textarea>
        </div>
      </div>

      <hr class="my-4" style="opacity: 0.1;">

      <div class="section-title">組隊偏好權重</div>
      <p class="text-muted small mb-3">這些設定將影響系統推薦隊友給您時的演算法優先權</p>
      
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <label class="form-label d-block mb-2">⏳ 可行時間重合度</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" name="timeWeight" value="1" id="time1"><label class="btn btn-outline-dark" for="time1">1</label>
            <input type="radio" class="btn-check" name="timeWeight" value="2" id="time2"><label class="btn btn-outline-dark" for="time2">2</label>
            <input type="radio" class="btn-check" name="timeWeight" value="3" id="time3"><label class="btn btn-outline-dark" for="time3">3</label>
            <input type="radio" class="btn-check" name="timeWeight" value="4" id="time4"><label class="btn btn-outline-dark" for="time4">4</label>
            <input type="radio" class="btn-check" name="timeWeight" value="5" id="time5"><label class="btn btn-outline-dark" for="time5">5</label>
          </div>
          <div class="mt-3">
            <a href="available_time.html" class="btn btn-time-config w-100">📅 點我更新可行時間表</a>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label d-block mb-2">⭐ 成員歷史評分</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" name="ratingWeight" value="1" id="rate1"><label class="btn btn-outline-dark" for="rate1">1</label>
            <input type="radio" class="btn-check" name="ratingWeight" value="2" id="rate2"><label class="btn btn-outline-dark" for="rate2">2</label>
            <input type="radio" class="btn-check" name="ratingWeight" value="3" id="rate3"><label class="btn btn-outline-dark" for="rate3">3</label>
            <input type="radio" class="btn-check" name="ratingWeight" value="4" id="rate4"><label class="btn btn-outline-dark" for="rate4">4</label>
            <input type="radio" class="btn-check" name="ratingWeight" value="5" id="rate5"><label class="btn btn-outline-dark" for="rate5">5</label>
          </div>
        </div>
      </div>

      <hr class="my-4" style="opacity: 0.1;">

      <div class="section-title">黑名單管理</div>
      <div class="mb-4">
        <div class="input-group mb-3">
          <input type="text" id="blacklistInput" class="form-control" placeholder="輸入想加入黑名單的同學學號">
          <button class="btn btn-outline-danger px-4" type="button" id="addBlacklistBtn">加入黑名單</button>
        </div>
        <div class="bg-light rounded-3 p-2">
          <ul id="blacklistDisplay" class="list-group list-group-flush bg-transparent">
            <li class="list-group-item text-muted text-center bg-transparent">載入中...</li>
          </ul>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-save w-100 text-white mt-3">儲存所有設定</button>
    </form>
  </div>

  <script>
    const studentid = localStorage.getItem('studentid');
    
    window.addEventListener('DOMContentLoaded', async () => {
      if (!studentid) {
        alert("請先登入");
        return location.href = 'index.html';
      }

      fetch('navbar.html').then(res => res.text()).then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
      });

      await loadProfile();
      await loadBlacklist();
    });

    async function loadProfile() {
      try {
        const res = await fetch(`http://localhost:3000/api/auth/profile/${studentid}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        document.getElementById('name').value = data.Student_Name || '';
        document.getElementById('dept').value = data.Student_Department || '';
        document.getElementById('experience').value = data.Experience || '';

        if (data.Skills) {
          const skillsArray = data.Skills.split(', ');
          document.querySelectorAll('input[name="skill"]').forEach(cb => {
            if (skillsArray.includes(cb.value)) cb.checked = true;
          });
        }

        if (data.Weight_Availability) {
          const el = document.getElementById('time' + Math.round(data.Weight_Availability));
          if (el) el.checked = true;
        }
        if (data.Weight_Rating) {
          const el = document.getElementById('rate' + Math.round(data.Weight_Rating));
          if (el) el.checked = true;
        }
      } catch (err) {
        console.error("載入失敗:", err);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        department: document.getElementById('dept').value,
        experience: document.getElementById('experience').value,
        skills: Array.from(document.querySelectorAll('input[name="skill"]:checked')).map(cb => cb.value),
        weight_availability: document.querySelector('input[name="timeWeight"]:checked')?.value || 1,
        weight_rating: document.querySelector('input[name="ratingWeight"]:checked')?.value || 1
      };

      try {
        const res = await fetch(`http://localhost:3000/api/auth/profile/${studentid}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          alert("✅ 儲存成功！");
          loadProfile();
        }
      } catch (err) {
        alert("網路錯誤");
      }
    });

    async function loadBlacklist() {
      try {
        const res = await fetch(`http://localhost:3000/api/auth/blacklist/${studentid}`);
        const list = await res.json();
        const container = document.getElementById("blacklistDisplay");
        container.innerHTML = "";
        if (!list || list.length === 0) {
          container.innerHTML = '<li class="list-group-item text-muted text-center bg-transparent">目前無黑名單</li>';
          return;
        }
        list.forEach(user => {
          const li = document.createElement("li");
          li.className = "list-group-item d-flex justify-content-between align-items-center bg-transparent";
          li.innerHTML = `
            <div>
              <strong>${user.Blocked_Student_ID}</strong> 
              <span class="text-secondary ms-2">${user.Student_Name || '未命名'}</span>
            </div>
            <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="removeFromBlacklist('${user.Blocked_Student_ID}')">移除</button>
          `;
          container.appendChild(li);
        });
      } catch (err) {}
    }

    document.getElementById("addBlacklistBtn").addEventListener("click", async () => {
      const blockedId = document.getElementById("blacklistInput").value.trim();
      if (!blockedId || blockedId === studentid) return alert("請輸入有效的學號");
      const res = await fetch("http://localhost:3000/api/auth/blacklist", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ owner_studentid: studentid, blocked_studentid: blockedId })
      });
      if (res.ok) {
        alert("已加入黑名單");
        document.getElementById("blacklistInput").value = "";
        loadBlacklist();
      }
    });

    async function removeFromBlacklist(bid) {
      if (!confirm("確定移除？")) return;
      await fetch(`http://localhost:3000/api/auth/blacklist/remove`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ owner_studentid: studentid, blocked_studentid: bid })
      });
      loadBlacklist();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
