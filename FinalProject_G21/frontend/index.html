<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>登入 - GROUPIE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #0d6efd;
      --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
      --bg-light-blue: #f0f7ff;
    }

    body {
      background-color: var(--bg-light-blue);
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    /* 登入卡片容器 */
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .custom-card {
      background: #ffffff;
      border: none;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(13, 110, 253, 0.1);
      padding: 40px;
      text-align: center;
    }

    .system-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .form-control {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 15px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }

    .form-control:focus {
      background-color: #ffffff;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
    }

    .btn-login {
      background: var(--primary-gradient);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      color: white;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    .btn-login:active { transform: scale(0.98); }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 25px 0;
      position: relative;
    }
    
    .divider::after {
      content: "或";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 0 10px;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    .btn-register {
      background: transparent;
      border: 2px solid var(--primary-blue);
      color: var(--primary-blue);
      border-radius: 12px;
      padding: 10px;
      font-weight: 700;
      width: 100%;
      transition: all 0.3s;
    }

    .btn-register:hover {
      background: rgba(13, 110, 253, 0.05);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="custom-card">
      <div class="system-title">GROUPIE</div>
      <p class="subtitle">聰明組隊，高效學習</p>

      <div class="mb-3 text-start">
        <label class="small fw-bold text-secondary ps-1">學號</label>
        <input type="text" class="form-control" id="studentid" placeholder="請輸入您的學號" required>
      </div>

      <div class="mb-4 text-start">
        <label class="small fw-bold text-secondary ps-1">密碼</label>
        <input type="password" class="form-control" id="password" placeholder="請輸入密碼" required>
      </div>

      <button class="btn btn-login" onclick="login()">立即登入</button>

      <div class="divider"></div>

      <button class="btn btn-register" onclick="location.href='register_step1.html'">註冊新帳號</button>
    </div>
  </div>

  <script>
    async function login() {
      const studentid = document.getElementById('studentid').value.trim();
      const password = document.getElementById('password').value;

      if (!studentid || !password) {
        // ✅ 原生彈窗，顯示 127.0.0.1:5500 顯示
        alert("⚠️ 請輸入學號與密碼");
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentid, password })
        });

        const result = await res.json();

        if (!res.ok) {
          if (res.status === 404) {
            alert("❌ 此學號尚未註冊，將為您導向註冊頁面");
            location.href = "register_step1.html";
          } else {
            alert(`❌ 登入失敗：${result.message}`);
          }
          return;
        }

        // 登入成功
        localStorage.setItem('studentid', studentid);
        location.href = 'home.html';

      } catch (err) {
        console.error(err);
        alert("⚠️ 無法連線伺服器，請檢查後端是否開啟");
      }
    }
  </script>
</body>
</html>
