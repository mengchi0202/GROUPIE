<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>組員詳情</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="navbar-placeholder"></div>
  <div class="container mt-5">
    <div class="d-flex align-items-center mb-4">
      <button class="btn btn-link text-decoration-none me-2" onclick="history.back()">&larr; 返回</button>
      <h2 class="mb-0" id="teamName">組員背景詳情</h2>
    </div>
    <div class="row g-3" id="memberList">
      </div>
  </div>

  <script>
    const teamId = new URLSearchParams(location.search).get('teamId');

    async function loadMembers() {
      try {
        const res = await fetch(`http://localhost:3000/api/teams/${teamId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        document.getElementById('teamName').textContent = `${data.course} - 組員詳情`;
        const list = document.getElementById('memberList');
        
        list.innerHTML = data.current_members.map(m => `
          <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100">
              <div class="card-body">
                <h5 class="card-title text-primary">${m.name}</h5>
                <p class="card-text mb-1"><strong>系級：</strong>${m.department || '未提供'}</p>
                <p class="card-text mb-1"><strong>專長：</strong>${m.specialty || '無'}</p>
                <p class="card-text"><strong>經歷：</strong>${m.experience || '無'}</p>
                <span class="badge bg-warning text-dark">評價：${m.rating || 0}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        alert("讀取失敗：" + err.message);
      }
    }

    fetch('navbar.html').then(r => r.text()).then(h => document.getElementById('navbar-placeholder').innerHTML = h);
    loadMembers();
  </script>
</body>
</html>
