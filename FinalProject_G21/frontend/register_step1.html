<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊 Step1 - GROUPIE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --primary-blue: #0d6efd;
      --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
      --bg-light-blue: #f0f7ff;
    }

    body { 
      background-color: var(--bg-light-blue); 
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
      min-height: 100vh;
    }

    /* 頂部藍色區塊 */
    .header-section {
      background: var(--primary-gradient);
      padding: 60px 0 80px 0;
      color: white;
      border-radius: 0 0 30px 30px;
      text-align: center;
    }

    /* 容器向上偏移，壓在藍色區塊上 */
    .form-container {
      margin-top: -50px;
      z-index: 10;
      position: relative;
      max-width: 500px;
    }

    .custom-card {
      border: none;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.08);
      padding: 40px;
    }

    .form-label { font-weight: 600; color: #475569; margin-bottom: 8px; }
    
    .form-control { 
      border: 1px solid #e2e8f0; 
      border-radius: 12px; 
      padding: 12px 15px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
    }

    .btn-submit {
      background: var(--primary-gradient);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      color: white;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .step-indicator {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-blue);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="header-section">
    <div class="container">
      <h2 class="fw-bold">GROUPIE-陪伴你尋找組員</h2>
      <p class="opacity-75">尋找志同道合的課業夥伴</p>
    </div>
  </div>

  <div class="container form-container mb-5">
    <div class="custom-card">
      <span class="step-indicator text-center">Step 1 </span>
      <h3 class="fw-bold mb-4 text-center">帳號基本資料</h3>

      <form id="registerStep1">
        <div class="mb-3">
          <label for="studentId" class="form-label">學號</label>
          <input type="text" class="form-control" id="studentId" placeholder="請輸入學號" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">密碼</label>
          <input type="password" class="form-control" id="password" placeholder="請輸入密碼" required>
        </div>

        <button type="submit" class="btn btn-submit">下一步：填寫個人資料</button>
      </form>
      
      <div class="mt-4 text-center">
        <p class="text-muted small">已有帳號？ <a href="index.html" class="text-decoration-none fw-bold">立即登入</a></p>
      </div>
    </div>
  </div>

  <script>
    // 1. 載入導覽列
    fetch('navbar_register.html')
      .then(res => res.text())
      .then(html => document.getElementById('navbar-placeholder').innerHTML = html);

    // 2. 註冊邏輯
    document.getElementById('registerStep1').addEventListener('submit', async function(e) {
      e.preventDefault();
  
      const studentId = document.getElementById('studentId').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
  
      try {
        const res = await fetch('http://localhost:3000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            studentid: studentId,
            email,
            password
          })
        });
  
        const result = await res.json();
  
        if (!res.ok) {
          // ✅ 失敗彈窗（含網址）
          alert(`❌ 註冊失敗：${result.message || '未知錯誤'}`);
          return;
        }
  
        // ✅ 成功彈窗（含網址 127.0.0.1:5500 顯示）
        alert("✅ 註冊成功！請繼續填寫個人資料");
        
        localStorage.setItem('studentid', studentId);
        location.href = 'register_step2.html';
  
      } catch (err) {
        console.error(err);
        alert("⚠️ 無法連線到伺服器，請確保後端已啟動");
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
