<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>組員互評 - GROUPIE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .comment-box {
      resize: none;
      height: 80px;
    }
    .card {
      border-radius: 12px;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-light">
  <div id="navbar-placeholder"></div>

  <div class="container mt-5 mb-5">
    <div class="d-flex align-items-center mb-4">
      <button type="button" class="btn btn-link text-decoration-none me-2" onclick="location.href='ongoing_teams.html'">&larr; 返回列表</button>
      <div>
        <h2 class="mb-0">組員互評</h2>
        <p class="text-muted mb-0" id="courseDisplay">載入課程中...</p>
      </div>
    </div>

    <form id="evaluationForm">
      <div id="memberList">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2">正在載入組員名單...</p>
        </div>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-primary btn-lg px-5">提交評分</button>
      </div>
    </form>
  </div>

  <script>
    // 取得暫存資訊
    const targetStr = localStorage.getItem("evaluation_target");
    const reviewer_id = localStorage.getItem("studentid");

    if (!targetStr || !reviewer_id) {
      alert("無效的訪問，請從進行中組隊進入");
      location.href = "ongoing_teams.html";
    }

    const target = JSON.parse(targetStr);
    const { teamId, course } = target;
    document.getElementById('courseDisplay').innerText = course;

    // 1. 初始化頁面：載入組員名單
    async function loadMembers() {
      try {
        const res = await fetch(`http://localhost:3000/api/teams/${teamId}/members/${reviewer_id}`);
        const members = await res.json();

        const container = document.getElementById('memberList');
        container.innerHTML = ''; // 清除 loading 狀態

        if (!members || members.length === 0) {
          container.innerHTML = '<p class="text-center py-5 text-muted">目前沒有其他組員可以評分。</p>';
          return;
        }

        members.forEach(m => {
          const card = document.createElement('div');
          card.className = 'card mb-3 shadow-sm';
          card.innerHTML = `
            <div class="card-body">
              <h5 class="card-title text-primary">組員：${m.Student_Name} (${m.Student_ID})</h5>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">參與度 (1-5)</label>
                  <select class="form-select" name="participation_${m.Student_ID}" required>
                    <option value="5" selected>5 - 非常積極</option>
                    <option value="4">4</option>
                    <option value="3">3 - 普通</option>
                    <option value="2">2</option>
                    <option value="1">1 - 幾乎沒參與</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">責任感 (1-5)</label>
                  <select class="form-select" name="responsibility_${m.Student_ID}" required>
                    <option value="5" selected>5 - 準時完成交辦事項</option>
                    <option value="4">4</option>
                    <option value="3">3 - 普通</option>
                    <option value="2">2</option>
                    <option value="1">1 - 經常失聯/擺爛</option>
                  </select>
                </div>
              </div>
              <div class="mt-3">
                <label class="form-label fw-bold">具體評語 (選填)</label>
                <textarea class="form-control comment-box" name="comment_${m.Student_ID}" placeholder="寫下對這位組員的評價..."></textarea>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error("載入組員失敗:", err);
        document.getElementById('memberList').innerHTML = '<p class="text-center text-danger">無法載入組員清單，請稍後再試。</p>';
      }
    }

    // 2. 提交評分邏輯
    document.getElementById('evaluationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const reviewsMap = {};

      for (let [key, value] of formData.entries()) {
        const [field, studentId] = key.split('_');
        if (!reviewsMap[studentId]) {
          reviewsMap[studentId] = {
            Rater_ID: reviewer_id,
            Rated_ID: studentId,
            Team_ID: teamId,
            Participation: 5,
            Responsibility: 5,
            Comment: ""
          };
        }

        if (field === 'participation') reviewsMap[studentId].Participation = parseInt(value);
        if (field === 'responsibility') reviewsMap[studentId].Responsibility = parseInt(value);
        if (field === 'comment') reviewsMap[studentId].Comment = value;
      }

      const reviewsArray = Object.values(reviewsMap);

      if (reviewsArray.length === 0) {
        alert("沒有評分資料可提交");
        return;
      }

      try {
        const res = await fetch("http://localhost:3000/api/teams/reviews/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reviews: reviewsArray })
        });

        if (res.ok) {
          alert("✅ 評分已成功提交！謝謝您的參與。");
          localStorage.removeItem("evaluation_target");
          location.href = "home.html"; 
        } else {
          const err = await res.json();
          alert("提交失敗：" + (err.message || "未知錯誤"));
        }
      } catch (err) {
        console.error("提交錯誤:", err);
        alert("網路錯誤，無法送出評分");
      }
    });

    loadMembers();
  </script>
</body>
</html>
